# NOTE: thos file is not auto-deployed. Edit /opt/drbt-profits/docker-compose.yml
services:
  web:
    image: ghcr.io/${GITHUB_REPO}:web-latest
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN}

  mcp:
    image: ghcr.io/${GITHUB_REPO}:mcp-latest
    restart: unless-stopped
    volumes:
      - mcp-data:/data
    environment:
      - PORT=3100
      - MCP_ADMIN_KEY=${MCP_ADMIN_KEY}
      - DATA_DIR=/data
    expose:
      - "3100"

  n8n:
    image: n8nio/n8n:stable
    restart: always
    environment:
      - N8N_HOST=n8n.ansett.xyz
      - WEBHOOK_URL=https://n8n.ansett.xyz
      - N8N_ENCRYPTION_KEY=3f2a9c8e7d6b5a4f1e0d9c8b7a6f5e4d3c2b1a0f9e8d7c6b5a4f3e2d1c0b9a8
      - DB_TYPE=sqlite
      - N8N_PROTOCOL=https
      - NODE_ENV=production
    volumes:
      - /home/tiky/.n8n_data:/home/node/.n8n

  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data

volumes:
  caddy_data:
  mcp-data: